<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Absensi App - Kamera Realtime</title>
    <script src="https://accounts.google.com/gsi/client" async defer></script>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            color: #333;
        }

        .container {
            max-width: 400px;
            margin: 0 auto;
            padding: 20px;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
            padding: 20px 0;
        }

        .time-display {
            font-size: 2.5em;
            font-weight: bold;
            margin-bottom: 10px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.3);
        }

        .employee-name {
            font-size: 1.3em;
            opacity: 0.9;
        }

        .attendance-buttons {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 40px;
            padding: 20px 0;
        }

        .attendance-btn {
            width: 220px;
            height: 220px;
            border-radius: 50%;
            border: none;
            font-size: 4em;
            color: white;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            margin: 0 auto;
            box-shadow: 0 10px 30px rgba(0,0,0,0.3);
            text-decoration: none;
        }

        .btn-datang {
            background: linear-gradient(135deg, #4CAF50, #45a049);
        }

        .btn-pulang {
            background: linear-gradient(135deg, #FF9800, #F57C00);
        }

        .attendance-btn:hover {
            transform: scale(1.05);
            box-shadow: 0 15px 40px rgba(0,0,0,0.4);
        }

        .btn-label {
            font-size: 1.1em;
            font-weight: bold;
            margin-top: 10px;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.3);
        }

        .camera-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.9);
            display: none;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            flex-direction: column;
        }

        .camera-view {
            width: 90vw;
            height: 70vh;
            max-width: 400px;
            max-height: 500px;
            border-radius: 20px;
            background: #000;
        }

        .camera-controls {
            display: flex;
            gap: 20px;
            margin-top: 20px;
        }

        .capture-btn {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            background: white;
            border: 5px solid #4CAF50;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .capture-btn:active {
            transform: scale(0.9);
            background: #4CAF50;
            border-color: white;
        }

        .close-btn {
            position: absolute;
            top: 20px;
            right: 20px;
            background: rgba(255,255,255,0.2);
            border: none;
            color: white;
            width: 50px;
            height: 50px;
            border-radius: 50%;
            font-size: 1.5em;
            cursor: pointer;
        }

        .result-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0,0,0,0.95);
            display: none;
            justify-content: center;
            align-items: center;
            flex-direction: column;
            z-index: 1001;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .result-image {
            width: 250px;
            height: 250px;
            object-fit: cover;
            border-radius: 20px;
            margin-bottom: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .success-icon {
            font-size: 5em;
            margin-bottom: 20px;
        }

        .loading {
            display: none;
            text-align: center;
            color: white;
        }

        .spinner {
            border: 4px solid rgba(255,255,255,0.3);
            border-top: 4px solid white;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 0 auto 20px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .input-group {
            margin: 20px 0;
        }

        .input-group label {
            display: block;
            margin-bottom: 8px;
            color: white;
            font-weight: bold;
        }

        .input-group input {
            width: 100%;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            background: rgba(255,255,255,0.9);
        }

        .btn-primary {
            background: linear-gradient(135deg, #4CAF50, #45a049);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 25px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            margin-top: 10px;
            transition: all 0.3s ease;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
        }

        .btn-secondary {
            background: rgba(255,255,255,0.2);
            color: white;
            border: 2px solid rgba(255,255,255,0.3);
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 14px;
            cursor: pointer;
            margin: 5px;
            transition: all 0.3s ease;
        }

        @media (max-width: 480px) {
            .container {
                padding: 10px;
            }
            
            .attendance-btn {
                width: 180px;
                height: 180px;
            }
            
            .time-display {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- Halaman Utama -->
        <div id="mainScreen">
            <div class="header">
                <div class="time-display" id="currentTime">
                    00:00:00<br>
                    01 Jan 2024
                </div>
                <div class="employee-name" id="employeeName">Nama Karyawan</div>
            </div>
            
            <div class="attendance-buttons">
                <button class="attendance-btn btn-datang" onclick="startAttendance('Datang')">
                    <div>👋</div>
                    <div class="btn-label">JAM DATANG</div>
                </button>
                
                <button class="attendance-btn btn-pulang" onclick="startAttendance('Pulang')">
                    <div>🚪</div>
                    <div class="btn-label">JAM PULANG</div>
                </button>
            </div>
        </div>

        <!-- Modal Input Nama -->
        <div id="nameModal" class="result-screen" style="display: none;">
            <h2 id="modalTitle">Absensi Datang</h2>
            <div class="input-group">
                <label for="employeeInput">Nama Karyawan:</label>
                <input type="text" id="employeeInput" placeholder="Masukkan nama lengkap" required>
            </div>
            <button class="btn-primary" onclick="openCamera()">📷 Mulai Kamera</button>
            <button class="btn-secondary" onclick="closeNameModal()">❌ Batal</button>
        </div>

        <!-- Kamera -->
        <div id="cameraContainer" class="camera-container">
            <button class="close-btn" onclick="closeCamera()">✕</button>
            <video id="video" class="camera-view" autoplay playsinline></video>
            <div class="camera-controls">
                <button class="capture-btn" onclick="capturePhoto()" title="Ambil Foto"></button>
            </div>
        </div>

        <!-- Hasil -->
        <div id="resultScreen" class="result-screen">
            <div class="success-icon" id="resultIcon">✅</div>
            <img id="resultImage" class="result-image" style="display: none;">
            <h2 id="resultTitle">Absensi Berhasil!</h2>
            <p id="resultMessage"></p>
            <div class="loading" id="uploadLoading">
                <div class="spinner"></div>
                <p>Mengunggah ke Google Drive...</p>
            </div>
            <button class="btn-primary" id="doneBtn" onclick="completeAttendance()" style="display: none;">Selesai</button>
            <button class="btn-secondary" onclick="retryAttendance()">📷 Ulangi Foto</button>
        </div>
    </div>

    <script>
        let stream = null;
        let capturedPhoto = null;
        let currentAttendanceType = '';
        let currentEmployeeName = '';

        // Update waktu real-time
        function updateTime() {
            const now = new Date();
            const timeString = now.toLocaleTimeString('id-ID', {
                hour12: false,
                hour: '2-digit',
                minute: '2-digit',
                second: '2-digit'
            });
            const dateString = now.toLocaleDateString('id-ID', {
                day: '2-digit',
                month: 'short',
                year: 'numeric'
            });
            document.getElementById('currentTime').innerHTML = `${timeString}<br>${dateString}`;
        }

        // Mulai absensi
        function startAttendance(type) {
            currentAttendanceType = type;
            document.getElementById('mainScreen').style.display = 'none';
            document.getElementById('nameModal').style.display = 'flex';
            document.getElementById('modalTitle').textContent = `Absensi ${type}`;
        }

        // Tutup modal nama
        function closeNameModal() {
            document.getElementById('nameModal').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }

        // Buka kamera
        async function openCamera() {
            currentEmployeeName = document.getElementById('employeeInput').value.trim();
            if (!currentEmployeeName) {
                alert('Mohon masukkan nama karyawan!');
                return;
            }

            document.getElementById('employeeName').textContent = currentEmployeeName;
            
            try {
                stream = await navigator.mediaDevices.getUserMedia({
                    video: { 
                        facingMode: 'user',
                        width: { ideal: 1280 },
                        height: { ideal: 720 }
                    }
                });

                const video = document.getElementById('video');
                video.srcObject = stream;
                
                document.getElementById('nameModal').style.display = 'none';
                document.getElementById('cameraContainer').style.display = 'flex';
                
            } catch (err) {
                alert('Gagal mengakses kamera: ' + err.message);
            }
        }

        // Tutup kamera
        function closeCamera() {
            if (stream) {
                stream.getTracks().forEach(track => track.stop());
            }
            document.getElementById('cameraContainer').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
        }

        // Ambil foto
        function capturePhoto() {
            const video = document.getElementById('video');
            const canvas = document.createElement('canvas');
            const context = canvas.getContext('2d');
            
            canvas.width = video.videoWidth;
            canvas.height = video.videoHeight;
            context.drawImage(video, 0, 0);
            
            capturedPhoto = canvas.toDataURL('image/jpeg', 0.9);
            
            closeCamera();
            showResultScreen();
        }

        // Tampilkan hasil
        function showResultScreen() {
            const resultImage = document.getElementById('resultImage');
            const resultTitle = document.getElementById('resultTitle');
            const resultMessage = document.getElementById('resultMessage');
            
            resultImage.src = capturedPhoto;
            resultImage.style.display = 'block';
            
            if (currentAttendanceType === 'Datang') {
                resultTitle.textContent = '✅ Datang Berhasil!';
                resultMessage.textContent = `${currentEmployeeName} - ${new Date().toLocaleString('id-ID')}`;
            } else {
                resultTitle.textContent = '✅ Pulang Berhasil!';
                resultMessage.textContent = `${currentEmployeeName} - ${new Date().toLocaleString('id-ID')}`;
            }
            
            document.getElementById('resultScreen').style.display = 'flex';
            uploadToDrive();
        }

        // Upload ke Google Drive (simulasi - ganti dengan API asli)
        async function uploadToDrive() {
            const loading = document.getElementById('uploadLoading');
            const doneBtn = document.getElementById('doneBtn');
            
            loading.style.display = 'block';
            
            // Simulasi upload (3-5 detik)
            const uploadTime = Math.random() * 2000 + 3000;
            
            setTimeout(() => {
                loading.style.display = 'none';
                doneBtn.style.display = 'block';
            }, uploadTime);
        }

        // Ulangi foto
        function retryAttendance() {
            document.getElementById('resultScreen').style.display = 'none';
            openCamera();
        }

        // Selesai absensi
        function completeAttendance() {
            document.getElementById('resultScreen').style.display = 'none';
            document.getElementById('mainScreen').style.display = 'block';
            
            // Reset
            capturedPhoto = null;
            currentEmployeeName = '';
            document.getElementById('employeeInput').value = '';
        }

        // Inisialisasi
        document.addEventListener('DOMContentLoaded', function() {
            updateTime();
            setInterval(updateTime, 1000);
            
            // Request permission kamera di iOS
            if (navigator.mediaDevices && navigator.mediaDevices.getUserMedia) {
                navigator.mediaDevices.getUserMedia({ video: true })
                    .then(stream => {
                        stream.getTracks().forEach(track => track.stop());
                    })
                    .catch(err => console.log('Permission pre-check:', err));
            }
        });

        // PWA Support
        let deferredPrompt;
        window.addEventListener('beforeinstallprompt', (e) => {
            deferredPrompt = e;
        });
    </script>
</body>
</html>
